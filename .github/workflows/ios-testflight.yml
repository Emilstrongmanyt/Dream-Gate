# Dream Gate iOS TestFlight — Unity build on Linux, sign/upload on Mac.
# Personal license: UNITY_SERIAL (F-prefix) + UNITY_EMAIL + UNITY_PASSWORD.

name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/ios-testflight.yml'

env:
  UNITY_VERSION: 6000.5.2f1
  PROJECT_PATH: .
  BUILD_NAME: DreamGate
  BUNDLE_ID: com.solodreams.dreamgate

jobs:
  build-unity-ios:
    name: Build Unity iOS project
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      - name: Build iOS Xcode project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: iOS
          projectPath: ${{ env.PROJECT_PATH }}
          buildName: ${{ env.BUILD_NAME }}
          versioning: None
          allowDirtyBuild: true
          customParameters: -bundleVersion 1.0 -buildNumber 1

      - name: Upload Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-iOS
          path: build/iOS
          if-no-files-found: error

  upload-testflight:
    name: Sign IPA and upload TestFlight
    runs-on: macos-latest
    needs: build-unity-ios
    steps:
      - name: Download Xcode project
        uses: actions/download-artifact@v4
        with:
          name: build-iOS
          path: build/iOS

      - name: Import signing certificate
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/distribution.p12
          echo -n "$IOS_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install provisioning profile
        env:
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/DreamGate.mobileprovision
          echo -n "$IOS_MOBILEPROVISION_BASE64" | base64 --decode -o "$PROFILE_PATH"
          PROFILE_PLIST=$(security cms -D -i "$PROFILE_PATH")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<< "$PROFILE_PLIST")
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: Build signed IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          XCODE_DIR=$(find build/iOS -name Unity-iPhone.xcodeproj -print -quit | xargs dirname)
          if [ -z "$XCODE_DIR" ]; then
            echo "Unity-iPhone.xcodeproj not found under build/iOS"
            find build -maxdepth 4 -type d
            exit 1
          fi
          echo "Using Xcode project at $XCODE_DIR"
          EXPORT_PLIST=$RUNNER_TEMP/ExportOptions.plist
          cat > "$EXPORT_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          cd "$XCODE_DIR"
          xcodebuild -allowProvisioningUpdates \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath $RUNNER_TEMP/DreamGate.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/DreamGate.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist "$EXPORT_PLIST"
          ls -la $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          APPLE_CONNECT_KEY: ${{ secrets.APPLE_CONNECT_KEY }}
          APPLE_CONNECT_KEY_ID: ${{ secrets.APPLE_CONNECT_KEY_ID }}
          APPLE_CONNECT_ISSUER_ID: ${{ secrets.APPLE_CONNECT_ISSUER_ID }}
        run: |
          KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo -n "$APPLE_CONNECT_KEY" | base64 --decode -o "$KEY_PATH"
          API_KEY_JSON=$RUNNER_TEMP/api_key.json
          python3 - <<'PY'
          import json, os
          key_path = os.path.join(os.environ["RUNNER_TEMP"], "AuthKey.p8")
          with open(key_path, "r", encoding="utf-8") as f:
              key = f.read()
          payload = {
              "key_id": os.environ["APPLE_CONNECT_KEY_ID"],
              "issuer_id": os.environ["APPLE_CONNECT_ISSUER_ID"],
              "key": key,
              "duration": 1200,
              "in_house": False,
          }
          out = os.path.join(os.environ["RUNNER_TEMP"], "api_key.json")
          with open(out, "w", encoding="utf-8") as f:
              json.dump(payload, f)
          print(f"Wrote {out}")
          PY
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in $RUNNER_TEMP/export"
            exit 1
          fi
          echo "Uploading $IPA_PATH"
          gem install fastlane --no-document
          fastlane pilot upload \
            --api_key_path "$RUNNER_TEMP/api_key.json" \
            --ipa "$IPA_PATH" \
            --skip_waiting_for_build_processing true